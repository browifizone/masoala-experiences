/* Elegant logo frames */
.masoala-site-logo{
  width:64px;
  padding:6px;
  border-radius:18px;
  background:linear-gradient(145deg,#fffdf7,#efe2c2);
  box-shadow:
    0 10px 24px rgba(0,0,0,.16),
    inset 0 1px 0 rgba(255,255,255,.9);
  border:1px solid rgba(191,152,76,.28);
}

.masoala-footer-logo{
  width:170px;
  padding:10px;
  border-radius:24px;
  background:linear-gradient(145deg,#fffdf7,#efe2c2);
  box-shadow:
    0 14px 34px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.95);
  border:1px solid rgba(191,152,76,.3);
  backdrop-filter:blur(4px);
}

@media(max-width:768px){
  .masoala-site-logo{
    width:54px;
    border-radius:16px;
  }

  .masoala-footer-logo{
    width:145px;
    border-radius:20px;
  }
}

/* Masoala logo integration */
.masoala-site-logo{
  width:64px;
  height:auto;
  display:block;
  object-fit:contain;
}

.masoala-footer-logo{
  width:165px;
  max-width:100%;
  height:auto;
  display:block;
  margin-bottom:1rem;
  object-fit:contain;
}

@media(max-width:768px){
  .masoala-site-logo{
    width:52px;
  }

  .masoala-footer-logo{
    width:140px;
  }
}
